<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmallTalk</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <h1>SmallTalk</h1>
    <p class="subtitle">Ручной факт → prompt preview → AI → 3 варианта</p>

    <section class="card">
      <label class="checkbox-row">
        <input type="checkbox" id="sendToAi" checked />
        Отправлять в AI
      </label>
      <p class="hint">
        Если галочка снята, будет показан только текст prompt без запроса в OpenAI.
      </p>
    </section>

    <section class="card form-grid">
      <label>
        Факт
        <textarea id="factText" rows="5" placeholder="Вставь факт здесь"></textarea>
      </label>

      <label>
        Аудитория / собеседник
        <input type="text" id="audience" placeholder="например: команда, коллеги, руководители" />
      </label>

      <label>
        Ситуация
        <input type="text" id="situation" placeholder="например: kickoff, синк, сложный разговор" />
      </label>

      <label>
        Цель
        <input type="text" id="goal" placeholder="например: разогреть разговор, мягко перейти к теме" />
      </label>

      <label>
        Тон
        <select id="tone">
          <option value="нейтральный">нейтральный</option>
          <option value="деловой">деловой</option>
          <option value="дружелюбный">дружелюбный</option>
          <option value="спокойный">спокойный</option>
        </select>
      </label>

      <label>
        Язык
        <select id="language">
          <option value="русский">русский</option>
          <option value="английский">английский</option>
        </select>
      </label>
    </section>

    <section class="card">
      <button id="generateBtn" type="button">Generate</button>
      <div id="timing" style="
  margin-top:12px;
  font-size:12px;
  color:#888;
"></div>
    </section>

    <section class="card">
      <h2>Prompt Preview</h2>
      <pre id="promptBox">Пока пусто.</pre>
    </section>

    <section class="card">
      <h2>Result</h2>
      <div id="resultBox">Пока пусто.</div>
    </section>

    <section class="card">
      <h2>History</h2>
      <button id="reloadHistoryBtn" type="button">Обновить history</button>
      <div id="historyBox">Пока пусто.</div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
